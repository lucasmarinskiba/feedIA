name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: read

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SBOM from CI
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: ./sbom
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom/*.json
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on release
        if: success() && secrets.ADMIN_WEBHOOK_URL != ''
        run: |
          curl -fsS -X POST "${{ secrets.ADMIN_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"text":"🚀 FeedIA ${{ github.ref_name }} released","url":"${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"}'

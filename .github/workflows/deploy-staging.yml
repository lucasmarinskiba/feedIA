name: Deploy Staging

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_STAGING }}
  PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL_STAGING }}

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref $SUPABASE_PROJECT_REF
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push Supabase migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_STAGING }}

      - name: Deploy Vercel Preview
        run: npx vercel --token=${{ secrets.VERCEL_TOKEN }} --target=preview --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Workers
        env:
          RENDER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}
        run: |
          set -e
          if [ -n "$RENDER_HOOK" ]; then
            echo "Triggering Render deploy hook..."
            curl -fsS -X POST "$RENDER_HOOK"
          elif [ -n "$RAILWAY_TOKEN" ]; then
            echo "Triggering Railway deploy..."
            npm install -g @railway/cli
            railway up --service feedia-workers --environment staging
          elif [ -n "$FLY_API_TOKEN" ]; then
            echo "Triggering Fly.io deploy..."
            npm install -g flyctl
            flyctl deploy --app feedia-workers-staging --image ghcr.io/${{ github.repository }}/workers:latest
          else
            echo "⚠️ No worker deploy hook/token configured. Skipping worker deploy."
          fi

      - name: Wait for Workers to restart
        run: sleep 30

      - name: Run smoke tests
        run: node scripts/smoke-tests.mjs "${{ env.PUBLIC_BASE_URL }}"
        env:
          OWNER_TEST_EMAIL: ${{ secrets.OWNER_TEST_EMAIL }}
          OWNER_TEST_PASSWORD: ${{ secrets.OWNER_TEST_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
